#数据库基本配置信息
spring.datasource.url=jdbc:mysql://localhost:3306/seckill?useUnicode=true&characterEncoding=UTF-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

#数据访问层接口对应的SQL映射文件路径
mybatis.mapper-locations=classpath:mappers/*.xml
#使用实体类别名
mybatis.type-aliases-package=com.shxy.seckill.entity
#mybatis开启获取主键
mybatis.configuration.use-generated-keys=true
#mybatis开启驼峰命名
mybatis.configuration.map-underscore-to-camel-case=true
#mybatis开启列名称的别名设置
mybatis.configuration.use-column-label=true
#logback打印日志配置信息
logging.config=classpath:logback.xml

#SpringMVC配置信息
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp